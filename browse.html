<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Entrata Data Browser</title>
<style>
  :root {
    --bg: #f6f6f2;
    --surface: #ffffff;
    --border: #e2e0d9;
    --text: #20201c;
    --muted: #6b6b63;
    --accent: #2d5c3f;
    --accent-soft: #e5ede8;
    --danger: #8a2a2a;
    --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.04);
    --radius: 8px;
    --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  header.topbar {
    position: sticky; top: 0; z-index: 10;
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 12px 24px; display: flex; align-items: center; gap: 16px;
  }
  header.topbar h1 { font-size: 15px; font-weight: 600; margin: 0; }
  header.topbar .crumbs { color: var(--muted); font-size: 14px; }
  header.topbar .crumbs a { margin-right: 6px; }
  header.topbar .spacer { flex: 1; }
  header.topbar .status { font-family: var(--mono); font-size: 12px; color: var(--muted); }

  main { padding: 24px; max-width: 1200px; margin: 0 auto; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px; box-shadow: var(--shadow); transition: border-color .15s, transform .05s;
  }
  .card.clickable { cursor: pointer; }
  .card.clickable:hover { border-color: var(--accent); }
  .card.clickable:active { transform: translateY(1px); }

  .card .id { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: .02em; }
  .card .name { font-size: 16px; font-weight: 600; margin-top: 4px; }
  .card .addr { color: var(--muted); font-size: 13px; margin-top: 6px; }
  .card .pill {
    display: inline-block; padding: 2px 8px; border-radius: 999px;
    background: var(--accent-soft); color: var(--accent); font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .04em;
  }
  .card .pill.muted { background: #eee; color: var(--muted); }
  .card.disabled { opacity: .55; }

  .detail-meta {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px 20px; margin-bottom: 24px; box-shadow: var(--shadow);
  }
  .detail-meta h2 { margin: 0 0 4px 0; font-size: 20px; }
  .detail-meta .sub { color: var(--muted); font-size: 14px; }
  .detail-meta .kv { margin-top: 12px; font-size: 13px; color: var(--muted); }
  .detail-meta .kv span { font-family: var(--mono); color: var(--text); }

  section.block { margin-bottom: 32px; }
  section.block > h3 {
    font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted);
    margin: 0 0 10px 0; font-weight: 600;
  }

  .fp-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 0; margin-bottom: 14px; box-shadow: var(--shadow); overflow: hidden;
  }
  .fp-head {
    padding: 16px 20px; display: flex; align-items: flex-start; gap: 16px; flex-wrap: wrap;
    cursor: pointer; user-select: none; transition: background-color .1s;
  }
  .fp-head:hover { background: #fafaf7; }
  .fp-card.open .fp-head { border-bottom: 1px solid var(--border); }
  .fp-head .chevron {
    flex: 0 0 auto; color: var(--muted); font-family: var(--mono); font-size: 12px;
    width: 18px; text-align: center; margin-top: 2px;
    transition: transform .15s;
  }
  .fp-card.open .fp-head .chevron { transform: rotate(90deg); }
  .fp-head h4 { margin: 0; font-size: 16px; font-weight: 600; }
  .fp-head .fp-id { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .fp-head .stats { display: flex; gap: 20px; flex-wrap: wrap; margin-left: auto; }
  .fp-head .stat { font-size: 13px; }
  .fp-head .stat .label { display: block; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .06em; }
  .fp-head .stat .val { font-weight: 600; font-variant-numeric: tabular-nums; }

  .fp-body { display: none; }
  .fp-card.open .fp-body { display: block; }

  table.units { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.units th, table.units td { padding: 10px 20px; text-align: left; border-top: 1px solid var(--border); vertical-align: middle; }
  table.units th { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); font-weight: 600; background: #fafaf7; }
  table.units td.num { font-variant-numeric: tabular-nums; }
  table.units tr.unit-row { cursor: pointer; transition: background-color .08s; }
  table.units tr.unit-row:hover { background: #fafaf7; }
  table.units tr.unit-row.open { background: var(--accent-soft); }
  table.units tr.unit-row .caret { color: var(--muted); font-family: var(--mono); font-size: 10px; margin-right: 6px; transition: transform .15s; display: inline-block; }
  table.units tr.unit-row.open .caret { transform: rotate(90deg); color: var(--accent); }
  table.units .avail { color: var(--accent); font-weight: 600; }
  table.units .avail.no { color: var(--muted); font-weight: 500; }
  table.units .empty { color: var(--muted); font-style: italic; padding: 14px 20px; }
  table.units tr.unit-details > td { background: #fbfaf5; padding: 0 20px 16px 44px; border-top: none; }
  table.units tr.unit-details .term-block { padding: 12px 0 4px 0; }
  table.units tr.unit-details .term-block .heading { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 8px; }
  table.terms { border-collapse: collapse; font-size: 13px; min-width: 460px; }
  table.terms th, table.terms td { padding: 6px 16px 6px 0; text-align: left; }
  table.terms th { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); font-weight: 600; }
  table.terms td.num { font-variant-numeric: tabular-nums; }
  table.terms .best { color: var(--accent); font-weight: 600; }

  .date-bar {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    margin-top: 14px; padding-top: 14px; border-top: 1px dashed var(--border);
  }
  .date-bar label { font-size: 13px; color: var(--muted); font-weight: 500; }
  .date-bar input[type="date"] {
    font: inherit; font-size: 14px; padding: 6px 10px; border: 1px solid var(--border);
    border-radius: 6px; background: #fff; color: var(--text);
  }
  .date-bar input[type="date"]:focus { outline: 2px solid var(--accent-soft); outline-offset: 1px; border-color: var(--accent); }
  .date-bar .hint { font-size: 12px; color: var(--muted); }
  .date-bar .clear-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    padding: 5px 10px; border-radius: 6px; font: inherit; font-size: 12px; cursor: pointer;
  }
  .date-bar .clear-btn:hover { border-color: var(--accent); color: var(--accent); }
  .date-bar .live-badge {
    display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600;
    color: var(--accent); background: var(--accent-soft);
    padding: 4px 10px; border-radius: 999px; text-transform: uppercase; letter-spacing: .04em;
  }
  .date-bar .live-badge::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); animation: pulse 1.6s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .4 } }

  .fees-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    box-shadow: var(--shadow); overflow: hidden;
  }
  .fees-summary {
    display: flex; gap: 28px; padding: 12px 20px; border-bottom: 1px solid var(--border);
    background: #fafaf7; font-size: 13px; color: var(--muted); flex-wrap: wrap;
  }
  .fees-summary strong { color: var(--text); font-weight: 600; }

  table.fees { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.fees th, table.fees td { padding: 10px 16px; text-align: left; border-top: 1px solid var(--border); vertical-align: top; }
  table.fees thead th { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); font-weight: 600; background: #fafaf7; border-top: none; }
  table.fees td.num { font-variant-numeric: tabular-nums; white-space: nowrap; }
  table.fees td .sub { color: var(--muted); font-size: 12px; display: block; margin-top: 2px; }
  table.fees .chip {
    display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600;
    letter-spacing: .02em; text-transform: uppercase;
  }
  .chip.level-property  { background: #e4ecf7; color: #1e4a8a; }
  .chip.level-floorplan { background: #f3e9df; color: #7a4c12; }
  .chip.level-unittype  { background: #e9edd9; color: #4b5c20; }
  .chip.cat-base        { background: #eee8e0; color: #4a3a22; }
  .chip.cat-amenity     { background: #e7efe5; color: #2d5c3f; }
  .chip.cat-pet         { background: #f6e4e4; color: #7a2828; }
  .chip.cat-addons      { background: #e8e0eb; color: #4b1e5b; }
  .chip.cat-special     { background: #fff1c7; color: #6b4a00; }
  .chip.cat-other       { background: #eee; color: var(--muted); }
  .chip.mand            { background: #fbe5e5; color: #7a2828; }
  .chip.opt             { background: var(--accent-soft); color: var(--accent); }
  .chip.refund          { background: var(--accent-soft); color: var(--accent); }
  .chip.nonrefund       { background: #eee; color: var(--muted); }

  .notice {
    padding: 12px 16px; border-radius: var(--radius); background: #fff7e6; border: 1px solid #f0d6a0;
    font-size: 13px; color: #6b4a00; margin-bottom: 16px;
  }
  .notice.danger { background: #fdecec; border-color: #e7bcbc; color: var(--danger); }

  .spinner { color: var(--muted); padding: 40px; text-align: center; font-size: 14px; }
  .btn-back {
    background: none; border: none; color: var(--accent); font: inherit; cursor: pointer; padding: 0;
  }
  .btn-back:hover { text-decoration: underline; }
</style>
</head>
<body>
<header class="topbar">
  <h1>Entrata Browser</h1>
  <div class="crumbs" id="crumbs"></div>
  <div class="spacer"></div>
  <div class="status" id="status"></div>
</header>

<main id="app">
  <div class="spinner">Loading…</div>
</main>

<script>
const app = document.getElementById('app');
const crumbs = document.getElementById('crumbs');
const statusEl = document.getElementById('status');

const h = (tag, attrs = {}, ...children) => {
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') el.className = v;
    else if (k === 'onClick') el.addEventListener('click', v);
    else if (k === 'html') el.innerHTML = v;
    else el.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null || c === false) continue;
    el.append(c.nodeType ? c : document.createTextNode(String(c)));
  }
  return el;
};
const clear = (node) => { while (node.firstChild) node.removeChild(node.firstChild); };
const asArray = (v) => v == null ? [] : Array.isArray(v) ? v : [v];
const fmtAddr = (a) => a ? [a.Address, [a.City, a.State].filter(Boolean).join(', '), a.PostalCode].filter(Boolean).join(' · ') : '';
const fmtRange = (min, max) => {
  if (min == null && max == null) return '—';
  if (min === max || max == null) return min;
  return `${min}–${max}`;
};
const fmtMoney = (n) => {
  if (n == null || n === '') return '—';
  const num = Number(String(n).replace(/[^0-9.\-]/g, ''));
  if (!isFinite(num)) return String(n);
  return num.toLocaleString('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 0, maximumFractionDigits: 2 });
};

function setStatus(s) { statusEl.textContent = s || ''; }
function setCrumbs(items) {
  clear(crumbs);
  items.forEach((c, i) => {
    if (i > 0) crumbs.append(' / ');
    if (c.href) crumbs.append(h('a', { href: c.href }, c.label));
    else crumbs.append(c.label);
  });
}

async function listView() {
  setCrumbs([{ label: 'Properties' }]);
  app.innerHTML = '<div class="spinner">Loading properties…</div>';
  setStatus('GET /api/properties');
  let properties;
  try {
    const res = await fetch('/api/properties');
    if (!res.ok) throw new Error((await res.json()).error || res.statusText);
    properties = await res.json();
  } catch (e) {
    setStatus('');
    clear(app);
    app.append(h('div', { class: 'notice danger' }, `Failed to load properties: ${e.message}`));
    return;
  }
  setStatus(`${properties.length} properties`);
  clear(app);

  const grid = h('div', { class: 'grid' });
  for (const p of properties) {
    const disabled = String(p.IsDisabled) === '1';
    const card = h('div', { class: `card clickable${disabled ? ' disabled' : ''}`, onClick: () => {
      location.hash = `#/p/${p.PropertyID}`;
    } },
      h('div', { class: 'id' }, `ID ${p.PropertyID}`),
      h('div', { class: 'name' }, p.MarketingName || '(no name)'),
      h('div', { class: 'addr' }, fmtAddr(p.Address) || '—'),
      h('div', { style: 'margin-top:10px' },
        h('span', { class: `pill${disabled ? ' muted' : ''}` }, disabled ? 'Disabled' : (p.Type || 'Active'))
      )
    );
    grid.append(card);
  }
  app.append(grid);
}

// Detail-view state. Lives only while viewing a single property.
let detailState = null;

function makeDetailState(propertyId) {
  return {
    propertyId,
    moveIn: '',                 // YYYY-MM-DD or ''
    data: null,                 // latest server payload
    loading: true,
    expandedFloorPlans: new Set(),
    expandedUnits: new Set(),
  };
}

const isBestFlag = (v) => v === '1' || v === 1 || v === true || v === 'true';

// Lease-term data from `getUnitsAvailabilityAndPricing`, keyed by unitSpaceId.
// Real response shape (Covey prod): PropertyUnit.UnitSpace is an object keyed by
// the numeric space ID, e.g. `UnitSpace: { "8727": { @attributes, Rent, Deposit } }`.
function buildLivePricingMap(livePricing) {
  const map = new Map();
  if (!livePricing || livePricing.__error) return map;
  const propertyUnits = asArray(livePricing?.PropertyUnits?.PropertyUnit);
  for (const pu of propertyUnits) {
    const container = pu?.UnitSpace || {};
    const spaces = [];
    // Dictionary shape: values keyed by space ID (numeric strings).
    for (const [k, v] of Object.entries(container)) {
      if (k === '@attributes') continue;
      if (v && typeof v === 'object' && v['@attributes']) spaces.push(v);
    }
    // Fallback: docs shape where UnitSpace is a direct object.
    if (!spaces.length && container?.['@attributes']) spaces.push(container);
    for (const space of spaces) {
      const attrs = space?.['@attributes'] || {};
      const id = String(attrs.Id ?? '');
      if (!id) continue;
      const terms = asArray(space?.Rent?.TermRent).map((t) => {
        const a = t?.['@attributes'] || t || {};
        return {
          leaseTermId:   a.LeaseTermId,
          leaseTerm:     a.LeaseTerm || a.LeaseTermName,
          rent:          a.Rent,
          baseRent:      a.BaseRent,
          rateFrequency: a.RateFrequency,
          isWebVisible:  a.IsWebVisible,
          startDate:     a.StartDate,
          endDate:       a.EndDate,
          isBestPrice:   a.IsBestPrice,
        };
      });
      map.set(id, {
        terms,
        availability: attrs.Availability,
        status:       attrs.Status,
        availableOn:  attrs.AvailableOn,
        minDeposit:   space?.Deposit?.['@attributes']?.MinDeposit,
        maxDeposit:   space?.Deposit?.['@attributes']?.MaxDeposit,
      });
    }
  }
  return map;
}

// Max 45 days out from today.
function dateRange() {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const max = new Date(today);
  max.setDate(today.getDate() + 45);
  const iso = (d) => d.toISOString().slice(0, 10);
  return { min: iso(today), max: iso(max) };
}

async function loadDetail() {
  if (!detailState) return;
  const { propertyId, moveIn } = detailState;
  detailState.loading = true;
  renderDetail();
  setStatus(`GET /api/property/${propertyId}${moveIn ? `?moveIn=${moveIn}` : ''}`);
  try {
    const qs = moveIn ? `?moveIn=${encodeURIComponent(moveIn)}` : '';
    const res = await fetch(`/api/property/${propertyId}${qs}`);
    if (!res.ok) throw new Error((await res.json()).error || res.statusText);
    detailState.data = await res.json();
  } catch (e) {
    detailState.data = { __fetchError: e.message };
  } finally {
    detailState.loading = false;
    renderDetail();
  }
}

function renderDetail() {
  const st = detailState;
  if (!st) return;
  clear(app);
  app.append(h('button', { class: 'btn-back', onClick: () => location.hash = '#/' }, '← All properties'));

  const data = st.data || {};
  const fetchErr = data.__fetchError;

  const props = asArray(data.property);
  const prop = props[0] || {};
  const floorPlans = asArray(data.floorPlans).filter((f) => f && !f.__error);
  const unitsByProp = asArray(data.units);
  const allUnits = unitsByProp.flatMap((p) => asArray(p?.units?.unit));
  const livePricing = data.livePricing;
  const livePricingMap = buildLivePricingMap(livePricing);

  // Meta block
  const { min: minDate, max: maxDate } = dateRange();
  const dateInput = h('input', {
    type: 'date',
    min: minDate,
    max: maxDate,
    value: st.moveIn || '',
  });
  dateInput.addEventListener('change', (e) => {
    const v = e.target.value;
    if (v && (v < minDate || v > maxDate)) {
      e.target.value = st.moveIn || '';
      return;
    }
    st.moveIn = v;
    loadDetail();
  });
  const clearBtn = h('button', { class: 'clear-btn', onClick: () => { st.moveIn = ''; loadDetail(); } }, 'Clear');

  const meta = h('div', { class: 'detail-meta', style: 'margin-top:12px' },
    h('h2', {}, prop.MarketingName || `Property ${st.propertyId}`),
    h('div', { class: 'sub' }, fmtAddr(prop.Address) || ''),
    h('div', { class: 'kv' },
      'PropertyID: ', h('span', {}, String(prop.PropertyID || st.propertyId)),
      prop.webSite ? h('span', {}, `  ·  ${prop.webSite}`) : null,
      prop.YearBuilt ? h('span', {}, `  ·  Built ${prop.YearBuilt}`) : null,
    ),
    h('div', { class: 'date-bar' },
      h('label', { for: 'moveIn' }, 'Move-in date:'),
      dateInput,
      h('span', { class: 'hint' }, `(up to ${new Date(maxDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })})`),
      st.moveIn ? clearBtn : null,
      st.moveIn && !livePricing?.__error ? h('span', { class: 'live-badge' }, 'Live pricing') : null,
    ),
  );
  app.append(meta);

  // Errors / state notices
  if (fetchErr) {
    app.append(h('div', { class: 'notice danger' }, `Failed: ${fetchErr}`));
    return;
  }
  if (st.loading) {
    app.append(h('div', { class: 'spinner' }, 'Loading…'));
    return;
  }
  if (data.floorPlans?.__error) {
    app.append(h('div', { class: 'notice danger' },
      `Floor plans failed: ${data.floorPlans.__error} (code ${data.floorPlans.__code || '?'})`));
  }
  if (data.units?.__error) {
    app.append(h('div', { class: 'notice' },
      `Units unavailable: ${data.units.__error} (code ${data.units.__code || '?'}) — showing floor plans only.`));
  }
  if (livePricing?.__error) {
    app.append(h('div', { class: 'notice' },
      `Live pricing unavailable for ${st.moveIn}: ${livePricing.__error}${livePricing.__code ? ` (code ${livePricing.__code})` : ''} — showing static rent.`));
  }
  if (!floorPlans.length && !data.floorPlans?.__error) {
    app.append(h('div', { class: 'notice' }, 'No floor plans returned for this property.'));
    return;
  }

  // Group units by floor-plan id. Production returns `floorPlanId` (cap P).
  const unitsByFloorplan = new Map();
  for (const u of allUnits) {
    const fpId = String(u?.floorPlanId ?? u?.floorplanId ?? '');
    if (!unitsByFloorplan.has(fpId)) unitsByFloorplan.set(fpId, []);
    unitsByFloorplan.get(fpId).push(u);
  }

  const section = h('section', { class: 'block' }, h('h3', {}, 'Floor Plans'));
  for (const fp of floorPlans) {
    const fpId = String(fp.Identification?.IDValue ?? fp.PropertyFloorPlanID ?? '');
    const isOpen = st.expandedFloorPlans.has(fpId);
    const bed = asArray(fp.Room).find((r) => r['@attributes']?.RoomType === 'Bedroom')?.Count ?? '—';
    const bath = asArray(fp.Room).find((r) => r['@attributes']?.RoomType === 'Bathroom')?.Count ?? '—';
    const sqft = fp.SquareFeet?.['@attributes'] || {};
    const rent = fp.MarketRent?.['@attributes'] || {};
    const dep = fp.Deposit?.Amount?.ValueRange?.['@attributes'] || {};
    const units = unitsByFloorplan.get(fpId) || [];

    const card = h('div', { class: `fp-card${isOpen ? ' open' : ''}` });

    const head = h('div', { class: 'fp-head' },
      h('div', { class: 'chevron' }, '▶'),
      h('div', {},
        h('h4', {}, fp.Name || 'Unnamed floor plan'),
        h('div', { class: 'fp-id' }, `ID ${fpId}${fp.Comment ? `  ·  ${fp.Comment}` : ''}`),
      ),
      h('div', { class: 'stats' },
        h('div', { class: 'stat' }, h('span', { class: 'label' }, 'Beds / Baths'), h('div', { class: 'val' }, `${bed} / ${bath}`)),
        h('div', { class: 'stat' }, h('span', { class: 'label' }, 'Sqft'), h('div', { class: 'val' }, fmtRange(sqft.Min, sqft.Max))),
        h('div', { class: 'stat' }, h('span', { class: 'label' }, 'Market Rent'), h('div', { class: 'val' }, `${fmtMoney(rent.Min)} – ${fmtMoney(rent.Max)}`)),
        h('div', { class: 'stat' }, h('span', { class: 'label' }, 'Deposit'), h('div', { class: 'val' }, `${fmtMoney(dep.Min)} – ${fmtMoney(dep.Max)}`)),
        h('div', { class: 'stat' }, h('span', { class: 'label' }, 'Units'), h('div', { class: 'val' }, `${fp.UnitsAvailable ?? 0} avail / ${fp.UnitCount ?? 0} total`)),
      ),
    );
    head.addEventListener('click', () => {
      if (isOpen) st.expandedFloorPlans.delete(fpId);
      else st.expandedFloorPlans.add(fpId);
      renderDetail();
    });
    card.append(head);

    const body = h('div', { class: 'fp-body' });
    if (data.units?.__error) {
      body.append(h('div', { class: 'empty' }, 'Unit list unavailable for this property.'));
    } else if (!units.length) {
      body.append(h('div', { class: 'empty' }, 'No individual units returned for this floor plan.'));
    } else {
      body.append(renderUnitsTable(units, livePricingMap, st));
    }
    card.append(body);

    section.append(card);
  }
  app.append(section);

  // Fees section (from `getPropertyFees` — Pricing API).
  const feesSection = renderFeesSection(data.fees);
  if (feesSection) app.append(feesSection);

  const feeCount = flattenFeeRows(data.fees).length;
  setStatus(`${floorPlans.length} floor plans · ${allUnits.length} units${feeCount ? ` · ${feeCount} fees` : ''}${st.moveIn ? ` · move-in ${st.moveIn}` : ''}`);
}

function flattenFeeRows(fees) {
  if (!fees || fees.__error) return [];
  const rows = [];
  for (const row of asArray(fees.propertyFees))  rows.push({ ...row, __level: 'property' });
  for (const row of asArray(fees.floorPlanFees)) rows.push({ ...row, __level: 'floorplan' });
  for (const row of asArray(fees.unitTypeFees))  rows.push({ ...row, __level: 'unittype' });
  return rows;
}

// Entrata returns one row per (lease term × customer relationship). For the UI
// we want one row per *distinct* fee, with the variants collapsed into a note.
function dedupeFees(rows) {
  const groups = new Map();
  for (const r of rows) {
    const key = [
      r.__level,
      r.cascadeReferenceId || r.cascadeReferenceName || '',
      r.chargeCodeName || '',
      r.entrataCategory || '',
      r.chargeTiming || '',
      r.detailedAmount ?? r.rateAmount ?? '',
      r.isOptional ?? '',
      r.isRefundable ?? '',
    ].join('|');
    if (!groups.has(key)) groups.set(key, { rep: r, terms: new Set(), customers: new Set() });
    const g = groups.get(key);
    if (r.leaseTerm) g.terms.add(r.leaseTerm);
    if (r.customerRelationshipName) g.customers.add(r.customerRelationshipName);
  }
  return [...groups.values()].map(g => ({
    ...g.rep,
    __terms: [...g.terms],
    __customers: [...g.customers],
  }));
}

function renderFeesSection(fees) {
  const section = h('section', { class: 'block' }, h('h3', {}, 'Fees'));

  if (!fees) {
    return null; // server didn't include the field at all
  }
  if (fees.__error) {
    const code = fees.__code;
    const isPermission = code === 1403 || /not allowed/i.test(fees.__error);
    const isEmpty = code === 310 || /no applicable fees/i.test(fees.__error);
    if (isPermission) {
      section.append(h('div', { class: 'notice' },
        `Pricing API not enabled for this key: "${fees.__error}"${code ? ` (code ${code})` : ''}. Covey's Entrata admin needs to grant the Pricing resource to this integration.`));
    } else if (isEmpty) {
      section.append(h('div', { class: 'notice' },
        `No fees configured in Entrata for this property yet. (API returned code ${code}: "${fees.__error}")`));
    } else {
      section.append(h('div', { class: 'notice danger' },
        `Fees call failed: ${fees.__error}${code ? ` (code ${code})` : ''}`));
    }
    return section;
  }

  const rawRows = flattenFeeRows(fees);
  if (!rawRows.length) {
    section.append(h('div', { class: 'notice' }, 'No fees returned for this property.'));
    return section;
  }
  const rows = dedupeFees(rawRows);

  // Summary: uses deduped rows.
  const monthlyMand = rows.filter((r) => /monthly/i.test(r.chargeTiming || '') && r.isOptional === '0').length;
  const moveInMand  = rows.filter((r) => /(move.?in|one.?time|application)/i.test(r.chargeTiming || '') && r.isOptional === '0').length;
  const optional    = rows.filter((r) => r.isOptional === '1').length;
  const card = h('div', { class: 'fees-card' });
  card.append(h('div', { class: 'fees-summary' },
    h('span', {}, h('strong', {}, `${rows.length}`), ` unique fees (${rawRows.length} raw rows)`),
    h('span', {}, h('strong', {}, `${monthlyMand}`), ' monthly mandatory'),
    h('span', {}, h('strong', {}, `${moveInMand}`), ' at application / move-in'),
    h('span', {}, h('strong', {}, `${optional}`), ' optional / conditional'),
  ));

  // Sort: level (property → floorplan → unittype), then category, then name.
  const levelOrder  = { property: 0, floorplan: 1, unittype: 2 };
  const catOrder    = { Base: 0, Amenity: 1, Pet: 2, 'Add Ons': 3, Special: 4 };
  rows.sort((a, b) => {
    const la = levelOrder[a.__level] ?? 9;
    const lb = levelOrder[b.__level] ?? 9;
    if (la !== lb) return la - lb;
    const ca = catOrder[a.entrataCategory] ?? 9;
    const cb = catOrder[b.entrataCategory] ?? 9;
    if (ca !== cb) return ca - cb;
    return (a.chargeCodeName || '').localeCompare(b.chargeCodeName || '');
  });

  const tbl = h('table', { class: 'fees' },
    h('thead', {}, h('tr', {},
      h('th', {}, 'Level'),
      h('th', {}, 'Category'),
      h('th', {}, 'Fee'),
      h('th', {}, 'When'),
      h('th', {}, 'Amount'),
      h('th', {}, 'Req.'),
      h('th', {}, 'Refund'),
    ))
  );
  const tbody = h('tbody', {});
  for (const r of rows) {
    const level = r.__level;
    const levelLabel = level === 'property' ? 'Property' : level === 'floorplan' ? 'Floor Plan' : 'Unit Type';
    const catKey = (r.entrataCategory || 'other').toLowerCase().replace(/\s+/g, '');
    const catClass = ['base','amenity','pet','addons','special'].includes(catKey) ? `cat-${catKey}` : 'cat-other';
    const amount = r.detailedAmount ?? r.rateAmount;
    const mandatory = r.isOptional === '0';
    const refundable = r.isRefundable === '1';
    const applies = [];
    if (r.__customers?.length) applies.push(`${r.__customers.length === 1 ? r.__customers[0] : `${r.__customers.length} applicant types`}`);
    if (r.__terms?.length > 1) applies.push(`${r.__terms.length} lease terms`);
    else if (r.__terms?.length === 1) applies.push(r.__terms[0]);
    tbody.append(h('tr', {},
      h('td', {}, h('span', { class: `chip level-${level}` }, levelLabel),
        r.cascadeReferenceName ? h('span', { class: 'sub' }, r.cascadeReferenceName) : null),
      h('td', {}, h('span', { class: `chip ${catClass}` }, r.entrataCategory || '—')),
      h('td', {},
        h('div', {}, r.chargeCodeName || '(unnamed)'),
        r.chargeCodeDescription && r.chargeCodeDescription !== r.chargeCodeName
          ? h('span', { class: 'sub' }, r.chargeCodeDescription) : null,
        applies.length ? h('span', { class: 'sub' }, `Applies to: ${applies.join(' · ')}`) : null,
      ),
      h('td', {}, r.chargeTiming || '—'),
      h('td', { class: 'num' }, amount != null && amount !== '' ? fmtMoney(amount) : '—'),
      h('td', {}, h('span', { class: `chip ${mandatory ? 'mand' : 'opt'}` }, mandatory ? 'Mandatory' : 'Optional')),
      h('td', {}, h('span', { class: `chip ${refundable ? 'refund' : 'nonrefund'}` }, refundable ? 'Refundable' : 'Non-refundable')),
    ));
  }
  tbl.append(tbody);
  card.append(tbl);
  section.append(card);
  return section;
}

function renderUnitsTable(units, livePricingMap, st) {
  const tbl = h('table', { class: 'units' },
    h('thead', {}, h('tr', {},
      h('th', {}, 'Unit #'),
      h('th', {}, 'Building'),
      h('th', {}, 'Beds / Baths'),
      h('th', {}, 'Sqft'),
      h('th', {}, 'Rent'),
      h('th', {}, 'Deposit'),
      h('th', {}, 'Status'),
      h('th', {}, 'Available'),
    ))
  );
  const tbody = h('tbody', {});
  for (const u of units) {
    const spaces = asArray(u?.unitSpaces?.unitSpace);
    const space = spaces[0] || {};
    const spaceId = String(space?.unitSpaceId ?? u?.id ?? '');
    const live = livePricingMap.get(spaceId);
    const isExpanded = st.expandedUnits.has(spaceId);

    // Resolve rent — prefer live pricing best term, then scalar marketRent, then rent range.
    let rentCell;
    if (live?.terms?.length) {
      const best = live.terms.find((t) => isBestFlag(t.isBestPrice)) || live.terms[0];
      rentCell = fmtMoney(best.rent);
    } else if (space.marketRent != null) {
      rentCell = fmtMoney(space.marketRent);
    } else if (space.rent) {
      rentCell = `${fmtMoney(space.rent.minRent)} – ${fmtMoney(space.rent.maxRent)}`;
    } else {
      rentCell = '—';
    }

    // Deposit
    const dMin = live?.minDeposit ?? space.minDeposit;
    const dMax = live?.maxDeposit ?? space.maxDeposit;
    const depCell = (dMin != null && dMax != null && dMin === dMax)
      ? fmtMoney(dMin)
      : (dMin != null || dMax != null)
        ? `${fmtMoney(dMin)} – ${fmtMoney(dMax)}`
        : '—';

    const status = live?.status || space.availabilityStatus || '—';
    const availRaw = live?.availableOn || space.availableDate;
    const avail = availRaw && availRaw !== 'YYYY-MM-DD' ? availRaw : '—';
    const isAvail = /vacant|available|unoccupied/i.test(status) && !/unavailable/i.test(status);

    const beds = u.numberOfBedrooms ?? u.noOfBedrooms;
    const baths = u.numberOfBathrooms ?? u.noOfBathrooms;
    const sqft = u.SquareFeet ?? u.squareFeet;

    const row = h('tr', { class: `unit-row${isExpanded ? ' open' : ''}` },
      h('td', {}, h('span', { class: 'caret' }, '▶'), u.unitNumber ?? '—'),
      h('td', {}, u.buildingName ?? '—'),
      h('td', {}, `${beds ?? '—'} / ${baths ?? '—'}`),
      h('td', { class: 'num' }, sqft ?? '—'),
      h('td', { class: 'num' }, rentCell),
      h('td', { class: 'num' }, depCell),
      h('td', {}, h('span', { class: `avail${isAvail ? '' : ' no'}` }, status)),
      h('td', {}, avail),
    );
    row.addEventListener('click', () => {
      if (isExpanded) st.expandedUnits.delete(spaceId);
      else st.expandedUnits.add(spaceId);
      renderDetail();
    });
    tbody.append(row);

    if (isExpanded) {
      tbody.append(renderUnitDetailsRow(u, space, live, st));
    }
  }
  tbl.append(tbody);
  return tbl;
}

function renderUnitDetailsRow(unit, space, live, st) {
  // Prefer live pricing term rent (date-aware); fall back to static.
  const liveTerms = live?.terms || [];
  const staticTerms = asArray(space?.rent?.termRent).map((t) => ({
    leaseTermId:   t.leaseTermId,
    leaseTerm:     t.leaseTerm || t.leaseTermName,
    rent:          t.rent,
    baseRent:      t.baseRent,
    rateFrequency: t.rateFrequency,
    isBestPrice:   t.isBestPrice,
    startDate:     t.startDate,
    endDate:       t.endDate,
  }));
  const terms = liveTerms.length ? liveTerms : staticTerms;
  const source = liveTerms.length ? 'Live pricing' : 'Static pricing';

  const cell = h('td', { colspan: 8 });

  const block = h('div', { class: 'term-block' },
    h('div', { class: 'heading' }, `Lease terms · ${source}${st.moveIn && liveTerms.length ? ` for move-in ${st.moveIn}` : ''}`),
  );

  if (!terms.length) {
    block.append(h('div', { class: 'empty', style: 'padding:8px 0' }, 'No lease terms returned for this unit.'));
  } else {
    const hasDates = terms.some((t) => t.startDate || t.endDate);
    const termTbl = h('table', { class: 'terms' },
      h('thead', {}, h('tr', {},
        h('th', {}, 'Term'),
        hasDates ? h('th', {}, 'Starts') : null,
        hasDates ? h('th', {}, 'Ends') : null,
        h('th', {}, 'Rent'),
        h('th', {}, 'Frequency'),
        h('th', {}, 'Best'),
      ))
    );
    const termBody = h('tbody', {});
    for (const t of terms) {
      const isBest = isBestFlag(t.isBestPrice);
      termBody.append(h('tr', { class: isBest ? 'best' : '' },
        h('td', {}, t.leaseTerm || `Term ${t.leaseTermId || ''}`),
        hasDates ? h('td', {}, t.startDate || '—') : null,
        hasDates ? h('td', {}, t.endDate || '—') : null,
        h('td', { class: 'num' }, fmtMoney(t.rent)),
        h('td', {}, t.rateFrequency || '—'),
        h('td', {}, isBest ? '★' : ''),
      ));
    }
    termTbl.append(termBody);
    block.append(termTbl);
  }

  cell.append(block);
  return h('tr', { class: 'unit-details' }, cell);
}

async function detailView(propertyId) {
  setCrumbs([
    { label: 'Properties', href: '#/' },
    { label: `#${propertyId}` },
  ]);
  detailState = makeDetailState(propertyId);
  app.innerHTML = '<div class="spinner">Loading property…</div>';
  await loadDetail();
}

function route() {
  const hash = location.hash || '#/';
  const m = hash.match(/^#\/p\/(\d+)$/);
  if (m) return detailView(m[1]);
  return listView();
}
window.addEventListener('hashchange', route);
route();
</script>
