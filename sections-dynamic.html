<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Covey Homes — Fee Transparency</title>
  <link rel="stylesheet" href="page.css" />
  <style>
    /* Stack the h1 and the "live data" pill vertically in the hero — the
       shared .site-hero__content is a row flexbox tuned for a single child. */
    .site-hero__content {
      flex-direction: column;
    }
    .dyn-live-note-row {
      display: block; width: 100%; margin-top: 12px; text-align: center;
    }
    .dyn-live-note {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 12px; color: rgba(255,255,255,0.85);
      margin: 0;
      padding: 4px 10px; background: rgba(255,255,255,0.1); border-radius: 999px;
      letter-spacing: .02em;
    }
    .dyn-live-note::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: #8cd39c; animation: dyn-pulse 1.6s infinite;
    }
    @keyframes dyn-pulse { 0%,100% { opacity: 1 } 50% { opacity: .4 } }

    .dyn-picker-band {
      background: #f3f1eb;
      border-bottom: 1px solid #e2e0d9;
      padding: 20px 0;
    }
    .dyn-picker-band__inner {
      max-width: 1200px; margin: 0 auto; padding: 0 24px;
      display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    }
    .dyn-picker {
      display: inline-flex; align-items: center; gap: 12px;
      padding: 10px 16px 10px 18px;
      background: #ffffff; border: 1px solid #d9d6cc; border-radius: 10px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
      font-size: 14px; color: #20201c;
    }
    .dyn-picker label {
      font-weight: 600; color: #4a5a52; font-size: 12px;
      text-transform: uppercase; letter-spacing: .06em;
    }
    .dyn-picker select {
      appearance: none; -webkit-appearance: none;
      background: transparent; border: none; font: inherit; font-size: 14px; color: #20201c;
      padding: 6px 28px 6px 4px; min-width: 280px; cursor: pointer;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1.5L6 6.5L11 1.5' stroke='%2320201c' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>");
      background-repeat: no-repeat; background-position: right 4px center;
    }
    .dyn-picker select:focus { outline: 2px solid #8cd39c; outline-offset: 2px; border-radius: 4px; }
    .dyn-picker-hint {
      font-size: 12px; color: #6b6b63; letter-spacing: .02em;
    }

    .dyn-empty {
      font-size: 13px; color: #999; font-style: italic;
      padding: 6px 0 2px;
    }
    .dyn-loading {
      text-align: center; padding: 100px 20px; color: #888; font-size: 15px;
    }
    .dyn-loading--small {
      padding: 24px; font-size: 13px;
    }
    .dyn-loading.is-overlay {
      position: relative; padding: 40px 20px;
    }
    .dyn-error {
      max-width: 720px; margin: 60px auto; padding: 24px;
      background: #fff5f5; border: 1px solid #e7bcbc; border-radius: 8px;
      color: #7a2828; font-size: 14px; line-height: 1.6;
    }
    .dyn-error code {
      display: block; margin-top: 8px; padding: 8px 12px;
      background: #fff; border: 1px solid #e7bcbc; border-radius: 4px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px;
      color: #20201c;
    }
  </style>
</head>
<body>

  <!-- ════════════════════════════════════════════════════════
       HERO + HEADER
       ════════════════════════════════════════════════════════ -->
  <div class="site-hero">
    <header class="site-header">
      <div class="site-header__inner">
        <a href="popups.html" class="site-header__logo">
          <img src="images/logo.svg" alt="Covey Homes" />
        </a>
        <nav class="site-header__nav">
          <a href="popups.html" class="nav-btn">Popups</a>
          <a href="sections-dynamic.html" class="nav-btn nav-btn--active">Fee Transparency</a>
        </nav>
      </div>
    </header>
    <div class="site-hero__content">
      <h1 class="site-hero__title">Fee Transparency</h1>
      <div class="dyn-live-note-row">
        <p class="dyn-live-note" id="dyn-hero-note">Loading fee data…</p>
      </div>
    </div>
  </div>

  <div class="dyn-picker-band" id="dyn-picker-band" style="display:none;">
    <div class="dyn-picker-band__inner">
      <div class="dyn-picker">
        <label for="dyn-property-select">Property</label>
        <select id="dyn-property-select"></select>
      </div>
    </div>
  </div>

  <main id="dyn-root">
    <div class="dyn-loading">Loading properties…</div>
  </main>

  <script>
    // Primary fee source. This page now reads from the client-provided JSON file
    // placed at the project root instead of the generated RentCafe-style export.
    const FEE_DATA_URL = 'covey_homes_fees.json';
    const DEFAULT_PROPERTY_ID = 'covey-homes-fees';

    // ─── helpers ────────────────────────────────────────────────────────────
    const fmtMoney = (n) => {
      if (n == null || n === '') return '';
      const num = Number(String(n).replace(/[^0-9.\-]/g, ''));
      if (!isFinite(num)) return String(n);
      return '$' + num.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
    };

    function normalizeFeeData(data) {
      if (Array.isArray(data?.fees)) return data;
      if (!Array.isArray(data?.pricing)) return { ...data, fees: [] };

      return {
        ...data,
        __propertyName: data.property_context?.appears_specific_to || 'Covey Homes',
        __propertyAddress: data.property_context?.address || '',
        __lastUpdated: Array.isArray(data.property_context?.document_dates_referenced)
          ? data.property_context.document_dates_referenced[data.property_context.document_dates_referenced.length - 1]
          : null,
        fees: data.pricing.map((item) => ({
          category: item.category || '',
          name: item.item || 'Fee',
          description: item.item || item.notes || 'Fee',
          timing: item.frequency || '',
          amount: item.amount,
          amount_min: item.amount_min,
          amount_max: item.amount_max,
          unit: item.unit,
          notes: item.notes,
          refundable: /non-refundable/i.test(item.notes || '') ? false : undefined,
        })),
      };
    }

    function amountLabel(fee) {
      if (fee.amount_min != null && fee.amount_max != null) return `${fmtMoney(fee.amount_min)} – ${fmtMoney(fee.amount_max)}`;
      if (fee.amount == null || fee.amount === '') return 'Varies';
      return typeof fee.amount === 'number' ? fmtMoney(fee.amount) : String(fee.amount);
    }

    function unitLabel(fee) {
      const unit = (fee.unit || '').trim();
      const timing = (fee.timing || '').toLowerCase();
      const monthly = timing === 'monthly' || /monthly|month/.test(timing);

      if (unit) {
        if (monthly && !/month|mo/i.test(unit)) return `${unit} / mo`;
        return unit;
      }
      if (monthly) return '/ mo';
      return '';
    }

    // Classify a fee into a section bucket. Skip rent and requirements (not fees).
    // Returns null to drop the row entirely.
    function categorize(fee) {
      const cat = (fee.category || '').toLowerCase();
      const name = (fee.name || '').toLowerCase();
      const desc = (fee.description || '').toLowerCase();
      const text = cat + ' ' + name + ' ' + desc;

      // Drop pure rent rows and qualification requirements — they're not fees.
      if (/gross potential|market rent/.test(text) || /^rent$/.test(name)) return null;
      if (/qualification requirement/.test(cat) || /income requirement/.test(text)) return null;

      if (cat === 'pet' || cat === 'pets' || /\bpet\b/.test(text)) return 'pets';
      if (/bundle|livemore/.test(text)) return 'bundle';
      if (/trash|water|sewer|electric|garbage|internet|wifi|utilit/.test(text)) return 'utilities';
      if (/parking/.test(text)) return 'parking';
      if (/rent.?report|homebody/.test(text)) return 'rent-reporting';
      if (/application|security deposit|admin|administrative|move.?in|holding|deposit/.test(text) || /application|deposit/.test(cat)) return 'get-started';
      // late/nsf/transfer/m2m/eviction/etc.
      return 'situational';
    }

    function feeRow(fee) {
      const amount = amountLabel(fee);
      const small = unitLabel(fee);
      const note = fee.notes || (fee.refundable === false && !/monthly/i.test(fee.timing || '') ? 'Non-refundable' : null);
      const label = fee.name || fee.description || 'Fee';
      return { label, amount, small, note };
    }

    // Security deposits should display as one combined row with the unit-type range.
    function depositRows(fees) {
      const deposits = fees.filter((f) =>
        /security deposit/i.test(f.name || '') || /security deposit/i.test(f.description || '')
      );
      if (!deposits.length) return [];
      const amounts = [...new Set(deposits.map((f) => f.amount).filter((a) => a != null))].sort((a, b) => a - b);
      if (!amounts.length) {
        return [{ label: 'Security Deposit', amount: 'Varies', small: '', note: 'Due at lease signing. Refundable.' }];
      }
      const amount = amounts.length === 1
        ? fmtMoney(amounts[0])
        : `${fmtMoney(amounts[0])} – ${fmtMoney(amounts[amounts.length - 1])}`;
      return [{
        label: 'Security Deposit',
        amount,
        small: amounts.length > 1 ? 'varies by unit type' : 'per unit',
        note: 'Due at lease signing. Refundable.',
      }];
    }

    function buildSections(propertyData) {
      const normalized = normalizeFeeData(propertyData);
      const fees = Array.isArray(normalized?.fees) ? normalized.fees : [];

      const bucket = { 'before-apply': [], 'get-started': [], pets: [], utilities: [], 'rent-reporting': [], situational: [], parking: [], bundle: [] };
      for (const f of fees) {
        // Security deposits handled separately below to collapse unit-type duplicates.
        if (/security deposit/i.test(f.name || '')) continue;
        const b = categorize(f);
        if (b && bucket[b]) bucket[b].push(f);
      }

      const rowsInSourceOrder = (fees) => fees.map(feeRow);
      const withoutNotes = (rows) => rows.map((row) => ({ ...row, note: null }));
      const orderedRows = (rows, patterns) => {
        const remaining = [...rows];
        const ordered = [];
        for (const pattern of patterns) {
          const idx = remaining.findIndex((row) => pattern.test(row.label));
          if (idx >= 0) ordered.push(remaining.splice(idx, 1)[0]);
        }
        return [...ordered, ...remaining];
      };
      const relabelRows = (rows, replacements) => rows.map((row) => {
        const match = replacements.find(([pattern]) => pattern.test(row.label));
        if (!match) return row;
        const label = typeof match[1] === 'function' ? match[1](row.label) : match[1];
        return { ...row, label };
      });
      const monthlyOnly = (row) => ({ ...row, small: /\/ mo|monthly/i.test(row.small || '') ? '/ mo' : row.small });
      const removeUnit = (row) => ({ ...row, small: '' });

      const getStartedRows = orderedRows(
        [...rowsInSourceOrder(bucket['get-started']), ...depositRows(fees)],
        [/administrative fee/i, /application fee/i, /security deposit/i],
      );

      const rentReportingRows = relabelRows(
        orderedRows(
          withoutNotes(rowsInSourceOrder(bucket['rent-reporting'])),
          [/single/i, /multiple/i],
        ),
        [
          [/^Single leaseholder$/i, 'Single'],
          [/^Multiple leaseholders$/i, 'Multiple'],
        ],
      ).map(monthlyOnly);

      const utilityRows = relabelRows(
        orderedRows(
          withoutNotes(rowsInSourceOrder(bucket.utilities)),
          [/billing admin|utility billing/i, /electric/i, /water\/sewer|water|sewer/i, /gas/i, /trash|garbage/i, /wi-?fi|internet/i],
        ),
        [
          [/^Utility billing admin fee$/i, 'Billing admin fee'],
          [/^Utility electric$/i, 'Electric'],
          [/^Utility water\/sewer$/i, 'Water/sewer'],
          [/^Utility gas$/i, 'Gas'],
          [/^Trash removal$/i, 'Trash'],
          [/^Internet Wi-?Fi$/i, 'WiFi'],
        ],
      ).map(monthlyOnly);

      const petRows = relabelRows(
        orderedRows(
          withoutNotes(rowsInSourceOrder(bucket.pets)),
          [/one-time pet fee - one pet|one pet/i, /one-time pet fee - two pets|two pets/i, /one-time pet fee - three pets|three pets/i, /monthly pet rent|pet rent/i],
        ),
        [
          [/^One-time pet fee - One Pet$/i, 'One Pet'],
          [/^One-time pet fee - Two Pets$/i, 'Two Pets'],
          [/^One-time pet fee - Three Pets$/i, 'Three Pets'],
          [/^Monthly pet rent$/i, 'Pet rent'],
        ],
      ).map((row) => /pet rent/i.test(row.label) ? monthlyOnly(row) : removeUnit(row));

      const situationalRows = relabelRows(
        rowsInSourceOrder(bucket.situational),
        [
          [/^Early lease termination \/ Lease break fee$/i, 'Early lease termination'],
        ],
      ).map((row) => {
        const cleaned = /transfer fee|replacement key/i.test(row.label)
          ? { ...row, note: null }
          : row;
        return /forced renter/i.test(cleaned.label) ? monthlyOnly(cleaned) : cleaned;
      });
      const bundleRows = rowsInSourceOrder(bucket.bundle).map((row) => ({
        ...monthlyOnly(row),
        label: 'Bundle cost',
        note: null,
      }));

      return [
        {
          id: 'before-apply',
          title: 'Before You Apply',
          description: [
            'A gross household income of 3 times the monthly rent.',
            'Favorable credit history for all applicants.',
            'Satisfactory rental history.',
            'Identity verification, criminal background, and credit check will be performed on every lease-holding resident 18 years of age or older.',
            'For more information regarding qualifying criteria, contact one of our associates.',
          ],
          rows: [],
        },
        {
          id: 'get-started',
          title: 'Get Started',
          rows: getStartedRows,
          disclaimer: 'If a renter is approved conditionally, they may be subject to additional requirements.',
        },
        {
          id: 'rent-reporting',
          title: 'Rent Reporting',
          description: 'Start building your credit today.',
          rows: rentReportingRows,
          disclaimer: 'Residents are automatically enrolled in a complimentary 30-day trial of Homebody Rent Reporting. After the trial period, the service will continue at the listed rate unless canceled.',
        },
        {
          id: 'utilities',
          title: 'Utilities',
          description: 'At Covey Homes, our MORE Smooth Move program ensures most major utilities are already set up before you move in. No utility deposits, no scheduling service calls, and no waiting around for activation—we’ve taken care of everything so you can settle in stress-free.',
          rows: utilityRows,
          disclaimer: 'Internet and cable are not provided for assets not offering WiFi or cable.',
        },
        {
          id: 'pets',
          title: 'Pets',
          description: [
            'Maximum 3 pets per home/apartment home.',
            'Breed restrictions apply.',
            'No weight restriction.',
          ],
          rows: petRows,
          disclaimer: 'Non-refundable.',
        },
        {
          id: 'parking',
          title: 'Parking',
          description: {
            intro: 'Your Home has at least 2 dedicated parking spaces:',
            spaces: ['Garage', 'Driveway'],
            body: [
              'The garage must be used to park an operable vehicle. No street parking unless specifically designated.',
            ],
            note: 'Note: Select homes may have an extended driveway to allow for added driveway spaces.',
          },
          rows: [],
        },
        {
          id: 'situational',
          title: 'Other Considerations',
          description: [
            'Plans can change, and residents should be aware that certain charges outlined in the lease may be applicable.',
          ],
          rows: situationalRows,
        },
        {
          id: 'bundle',
          title: 'LiveMORE Bundle',
          description: [
            'Includes Smart Home Technology, Landscape Care, Amenity Access, and Pest Control.',
          ],
          rows: bundleRows,
          accent: true,
        },
      ];
    }

    // ─── HTML helpers ───────────────────────────────────────────────────────
    const el = (tag, attrs = {}, ...children) => {
      const n = document.createElement(tag);
      for (const [k, v] of Object.entries(attrs)) {
        if (k === 'class') n.className = v;
        else if (k === 'html') n.innerHTML = v;
        else if (v != null) n.setAttribute(k, v);
      }
      for (const c of children) {
        if (c == null || c === false) continue;
        n.append(c.nodeType ? c : document.createTextNode(String(c)));
      }
      return n;
    };
    const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

    function descriptionLines(description) {
      return Array.isArray(description) ? description : [description];
    }

    function renderDescription(description) {
      if (!description) return null;
      if (description.spaces) {
        return el('div', { class: 'fee-panel__desc fee-panel__desc--parking' },
          el('p', {}, description.intro),
          el('ul', { class: 'fee-panel__desc-nested' },
            ...description.spaces.map((space) => el('li', {}, space)),
          ),
          ...(description.body || []).map((line) => el('p', {}, line)),
          description.note && el('p', { class: 'fee-panel__desc-note' }, description.note),
        );
      }

      const lines = descriptionLines(description);
      if (lines.length === 1) {
        return el('div', { class: 'fee-panel__desc' }, el('p', {}, lines[0]));
      }
      if (lines.length > 1) {
        return el('div', { class: 'fee-panel__desc' },
          el('ul', {}, ...lines.map((line) => el('li', {}, line))),
        );
      }
      return null;
    }

    // ─── Tabs + Panels layout ───────────────────────────────────────────────
    function renderTabs(sections, eyebrow, headline, subhead) {
      const section = el('section', { class: 'fees-section fees-section--light', id: 'fees-tabs' });
      const container = el('div', { class: 'fees-container fees-tabs-layout' });
      const left = el('div', { class: 'fees-tabs-left' },
        el('h2', { class: 'fees-headline' }, headline));
      const tabs = el('nav', { class: 'fee-tabs', role: 'tablist' });
      for (let i = 0; i < sections.length; i++) {
        const s = sections[i];
        const btn = el('button', {
          class: 'fee-tab' + (i === 0 ? ' fee-tab--active' : '') + (s.accent ? ' fee-tab--accent' : ''),
          role: 'tab',
          'data-tab': `tab-${s.id}`,
        }, s.title);
        tabs.append(btn);
      }
      left.append(tabs);

      const right = el('div', { class: 'fees-tabs-right' });
      for (let i = 0; i < sections.length; i++) {
        const s = sections[i];
        const hasDescription = Boolean(s.description);
        const panel = el('div', {
          class: 'fee-panel' + (i === 0 ? ' fee-panel--active' : '') + (s.accent ? ' fee-panel--accent' : ''),
          id: `tab-${s.id}`,
        });
        panel.append(el('div', { class: 'fee-panel__header' }, el('h3', {}, s.title)));
        const desc = renderDescription(s.description);
        if (desc) panel.append(desc);
        if (!s.rows.length && !hasDescription) {
          panel.append(el('p', { class: 'fee-acc-note' }, 'Not currently available for this property.'));
        } else {
          for (const r of s.rows) {
            const val = r.small ? `${r.amount} ${r.small}` : r.amount;
            panel.append(el('div', { class: 'fee-acc-row' }, el('span', {}, r.label), el('span', {}, val)));
            if (r.note) panel.append(el('p', { class: 'fee-acc-note' }, r.note));
          }
        }
        const disclaimer = renderDescription(s.disclaimer);
        if (disclaimer) panel.append(disclaimer);
        right.append(panel);
      }
      container.append(left, right);
      section.append(container);
      return section;
    }

    // ─── Tab switching ──────────────────────────────────────────────────────
    function wireInteractive(root) {
      root.querySelectorAll('.fee-tab').forEach((tab) => {
        tab.addEventListener('click', () => {
          const tablist = tab.closest('.fee-tabs');
          const section = tab.closest('.fees-tabs-layout');
          tablist.querySelectorAll('.fee-tab').forEach((t) => t.classList.remove('fee-tab--active'));
          tab.classList.add('fee-tab--active');
          section.querySelectorAll('.fee-panel').forEach((p) => p.classList.remove('fee-panel--active'));
          const panel = section.querySelector('#' + tab.dataset.tab);
          if (panel) panel.classList.add('fee-panel--active');
        });
      });
    }

    // ─── main ───────────────────────────────────────────────────────────────
    let propertyIndex = [];        // [{ id, name, address, file }]
    const propertyCache = new Map(); // id -> loaded property JSON
    let currentLoadToken = 0;        // guards against race when user switches quickly

    function propertyIdFromHash() {
      const m = (location.hash || '').match(/^#(\d+)$/);
      return m ? m[1] : null;
    }

    function showError(message) {
      const root = document.getElementById('dyn-root');
      root.innerHTML = '';
      root.append(el('div', { class: 'dyn-error' },
        el('strong', {}, "Couldn't load fee data."),
        el('p', {}, message),
      ));
    }

    function populateSelector() {
      const select = document.getElementById('dyn-property-select');
      const sorted = [...propertyIndex].sort((a, b) => (a.name || '').localeCompare(b.name || ''));
      select.innerHTML = '';
      for (const p of sorted) {
        const opt = document.createElement('option');
        opt.value = String(p.id);
        opt.textContent = p.name || `Property ${p.id}`;
        select.append(opt);
      }
      select.addEventListener('change', () => {
        location.hash = `#${select.value}`;
      });
      document.getElementById('dyn-picker-band').style.display =
        propertyIndex.length > 1 ? 'block' : 'none';
    }

    function selectedId() {
      const fromHash = propertyIdFromHash();
      if (fromHash && propertyIndex.some((p) => String(p.id) === fromHash)) return fromHash;
      if (propertyIndex.some((p) => String(p.id) === DEFAULT_PROPERTY_ID)) return DEFAULT_PROPERTY_ID;
      return propertyIndex[0] && String(propertyIndex[0].id);
    }

    async function loadProperty(propertyId) {
      const token = ++currentLoadToken;
      const meta = propertyIndex.find((p) => String(p.id) === String(propertyId));
      if (!meta) {
        showError(`Property ${propertyId} not found in index.`);
        return;
      }

      const select = document.getElementById('dyn-property-select');
      if (select && select.value !== String(propertyId)) select.value = String(propertyId);

      const root = document.getElementById('dyn-root');
      root.innerHTML = '';
      root.append(el('div', { class: 'dyn-loading' }, 'Loading fees…'));
      document.getElementById('dyn-hero-note').textContent = `Loading ${meta.name || 'property'}…`;

      try {
        let data = propertyCache.get(propertyId);
        if (!data) {
          const url = meta.file || FEE_DATA_URL;
          const res = await fetch(url, { cache: 'no-cache' });
          if (!res.ok) throw new Error(`HTTP ${res.status} loading ${url}`);
          data = await res.json();
          propertyCache.set(propertyId, data);
        }
        if (token !== currentLoadToken) return;
        render(meta, data);
      } catch (e) {
        if (token !== currentLoadToken) return;
        showError(e.message);
      }
    }

    function render(meta, data) {
      const normalized = normalizeFeeData(data);
      const sections = buildSections(normalized);
      const addr = normalized.__propertyAddress || meta.address || '';
      const generated = normalized.__generatedAt
        ? new Date(normalized.__generatedAt).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })
        : normalized.__lastUpdated;

      const subhead = addr || '';

      const totalRows = sections.reduce((n, s) => n + s.rows.length, 0);
      document.getElementById('dyn-hero-note').textContent =
        totalRows
          ? `Showing ${totalRows} fees${generated ? ` · Updated ${generated}` : ''}`
          : `No fees configured${generated ? ` · Updated ${generated}` : ''}`;

      const root = document.getElementById('dyn-root');
      root.innerHTML = '';
      root.append(renderTabs(sections, '', 'Complete Fee Breakdown', subhead));
      wireInteractive(root);
    }

    async function init() {
      try {
        const res = await fetch(FEE_DATA_URL, { cache: 'no-cache' });
        if (!res.ok) throw new Error(`HTTP ${res.status} loading ${FEE_DATA_URL}`);
        const data = await res.json();
        const normalized = normalizeFeeData(data);
        propertyIndex = [{
          id: DEFAULT_PROPERTY_ID,
          name: normalized.__propertyName || 'Covey Homes',
          address: normalized.__propertyAddress || '',
          file: FEE_DATA_URL,
        }];
        propertyCache.set(DEFAULT_PROPERTY_ID, data);
      } catch (e) {
        showError(e.message);
        return;
      }

      populateSelector();
      window.addEventListener('hashchange', () => {
        const id = selectedId();
        if (id) loadProperty(id);
      });
      const id = selectedId();
      if (id) loadProperty(id);
    }

    init();
  </script>
</body>
