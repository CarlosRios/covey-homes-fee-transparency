name: Sync Entrata Data

on:
  schedule:
    # Runs every night at 3 AM UTC (10 PM EST / 11 PM EDT)
    - cron: '0 3 * * *'
  workflow_dispatch: # allow manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Entrata snapshot
        env:
          ENTRATA_BASE_URL: ${{ secrets.ENTRATA_BASE_URL }}
          ENTRATA_API_KEY: ${{ secrets.ENTRATA_API_KEY }}
        run: node scripts/fetch-entrata.mjs snapshot

      - name: Commit snapshot (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/entrata-snapshot.json
          if git diff --cached --quiet; then
            echo "No changes to snapshot — skipping commit."
          else
            git commit -m "chore: nightly Entrata fee snapshot"
            git push
          fi
